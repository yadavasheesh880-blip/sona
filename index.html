<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Surprise ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* Jo cheez scratch karne ke baad dikhegi */
        .hidden-content {
            position: absolute;
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 1;
        }

        .hidden-content img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .hidden-content h2 {
            color: #ff0044;
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .hidden-content p {
            color: #555;
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
        }

        /* Scratch karne wala Canvas (Upar ka cover) */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Yahan photo aur message hai jo chupe rahenge -->
    <div class="hidden-content">
        <img src="729363885_1338324101777226_4474081011495159254_n.jpg" alt="Our Memory">
        <h2>Meri Favorite Lottery! 🎰</h2>
        <p>Tumhe paana meri zindagi ki sabse badi jeet hai. Hamesha aise hi muskurati rehna mere sath!</p>
    </div>

    <!-- Yeh woh layer hai jise scratch karna hai -->
    <canvas id="scratch-layer"></canvas>

    <script>
        const canvas = document.getElementById('scratch-layer');
        const ctx = canvas.getContext('2d');

        // Screen ke hisaab se canvas ko set karna
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Gradient Background (Pink/Red mix) ban banana
        let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, "#ff0844");
        gradient.addColorStop(1, "#ffb199");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Upar likha text
        ctx.fillStyle = "white";
        
        // Mobile aur laptop ke liye text size adjust karna
        const fontSize = canvas.width < 600 ? "20px" : "30px";
        ctx.font = `bold ${fontSize} 'Segoe UI'`;
        ctx.textAlign = "center";
        
        // Screen ke theek beech mein text likhna
        ctx.fillText("Apni ungli se screen ko scratch karo! 👆✨", canvas.width / 2, canvas.height / 2);

        // Scratching ka logic (Touch aur Mouse dono ke liye)
        let isDrawing = false;

        function getMousePos(e) {
            let rect = canvas.getBoundingClientRect();
            let clientX = e.clientX || e.touches[0].clientX;
            let clientY = e.clientY || e.touches[0].clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startPosition(e) {
            isDrawing = true;
            scratch(e);
        }

        function endPosition() {
            isDrawing = false;
            ctx.beginPath();
        }

        function scratch(e) {
            if (!isDrawing) return;
            e.preventDefault(); // Mobile par screen scroll hone se rokna
            let pos = getMousePos(e);
            
            // "destination-out" ka matlab hai ki jahan draw hoga wahan se color mit jayega
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 60; // Kitna bada area ek baar mein scratch hoga
            ctx.lineCap = 'round';
            
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        // Mouse Events (Laptop ke liye)
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', scratch);

        // Touch Events (Mobile ke liye)
        canvas.addEventListener('touchstart', startPosition, {passive: false});
        canvas.addEventListener('touchend', endPosition);
        canvas.addEventListener('touchmove', scratch, {passive: false});

        // Window resize hone par canvas theek karna
        window.addEventListener('resize', () => {
            let currentData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.putImageData(currentData, 0, 0);
        });
    </script>
</body>
</html>
